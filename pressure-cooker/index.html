<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Whistle Stop | Pressure Cooker Whistle Counter</title>
    <meta name="description"
        content="A smart, AI-powered pressure cooker whistle counter using Google Teachable Machine. Never lose count of your whistles again.">
    <meta name="theme-color" content="#030712">

    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WhistleWise">
    <link rel="apple-touch-icon" href="whistlewise_icon.png">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏲️</text></svg>">

    <!-- Google Fonts: Outfit & Manrope & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="script.css">

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Animated Background -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="version-tag">v1.1.0</div>

    <div class="container">
        <!-- Main Card -->
        <div class="card" id="main-card">
            <!-- Subtle inner glow border -->
            <div class="card-glow"></div>

            <header class="header">
                <div class="logo-row">
                    <i data-lucide="gauge" class="logo-icon"></i>
                    <h1>Whistle Stop</h1>
                </div>
                <p class="subtitle">AI-Powered Pressure Cooker Counter</p>
            </header>

            <!-- Counter Visual -->
            <div class="counter-container">
                <svg class="progress-ring" width="220" height="220" viewBox="0 0 220 220">
                    <defs>
                        <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#0ea5e9" />
                            <stop offset="100%" style="stop-color:#8b5cf6" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.06)" stroke-width="6"
                        fill="transparent" r="95" cx="110" cy="110" />
                    <circle id="progress-ring-circle" class="progress-ring__bar" stroke="url(#ring-gradient)"
                        stroke-width="6" stroke-linecap="round" fill="transparent" r="95" cx="110" cy="110" />
                </svg>
                <div class="counter-ring" id="counter-ring"></div>
                <div class="counter-value" id="counter-value">0</div>
            </div>

            <!-- Status Indicator -->
            <div class="status-badge" id="status-badge">
                <span id="status-dot" class="dot"></span>
                <span id="status-text">Ready</span>
            </div>

            <!-- Audio Visualization -->
            <div class="visualizer" id="visualizer">
                <!-- Bars added via JS -->
            </div>


            <!-- Target Whistles -->
            <div class="target-control">
                <label class="target-label">
                    <i data-lucide="target" class="label-icon"></i>
                    Target Whistles
                </label>
                <div class="target-input-row">
                    <button class="btn-stepper" id="target-minus" aria-label="Decrease target">
                        <i data-lucide="minus" class="stepper-icon"></i>
                    </button>
                    <div class="target-value-col">
                        <input type="number" id="target-input" value="3" min="1" max="50">
                        <div class="target-progress">
                            <div id="target-bar" class="target-bar"></div>
                        </div>
                    </div>
                    <button class="btn-stepper" id="target-plus" aria-label="Increase target">
                        <i data-lucide="plus" class="stepper-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="start-btn" class="btn btn-primary">
                    <i data-lucide="play" class="btn-icon"></i>
                    Start Counting
                </button>
                <button id="reset-btn" class="btn btn-secondary">
                    <i data-lucide="rotate-ccw" class="btn-icon"></i>
                    Reset Count
                </button>
            </div>

            <!-- Preload notification sound (Calmer chime) -->
            <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
                preload="auto"></audio>

            <!-- Terminal Logs -->
            <div class="terminal-container">
                <div class="terminal-header" id="terminal-header">
                    <div class="terminal-dots">
                        <span class="dot-t dot-red"></span>
                        <span class="dot-t dot-yellow"></span>
                        <span class="dot-t dot-green"></span>
                    </div>
                    <span class="terminal-title">system_logs</span>
                </div>
                
                <!-- Probability meters moved inside terminal -->
                <div class="prob-container" id="prob-container">
                    <div class="prob-row">
                        <div class="prob-label">
                            <span class="prob-name">CMD: WHISTLE_CONFIDENCE</span>
                            <span class="prob-pct" id="prob-whistle-pct">0%</span>
                        </div>
                        <div class="prob-track">
                            <div class="prob-fill" id="prob-whistle-fill" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="prob-row">
                        <div class="prob-label">
                            <span class="prob-name">CMD: AMBIENT_NOISE</span>
                            <span class="prob-pct" id="prob-noise-pct">0%</span>
                        </div>
                        <div class="prob-track">
                            <div class="prob-fill noise" id="prob-noise-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="terminal-body" id="terminal-body">
                    <div class="log-line">>_ initializing_system...</div>
                </div>
            </div>
        </div>

        <div id="mobile-unlock" class="mobile-unlock-overlay" style="display: none;">
            <div class="unlock-content">
                <i data-lucide="mic" class="unlock-icon" style="width: 48px; height: 48px; margin-bottom: 20px; color: var(--accent-color);"></i>
                <h2 style="font-size: 1.5rem; margin-bottom: 10px;">Audio Permission</h2>
                <p style="font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8;">Tap below to enable the AI engine and microphone access.</p>
                <button id="unlock-btn" class="btn btn-primary" style="max-width: 250px;">Enable Engine</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <a href="https://github.com/ben0753" target="_blank" class="dev-tag">
                <i data-lucide="code-2" style="width: 14px; height: 14px;"></i>
                <span>Built by <span class="tag-highlight">Benson</span></span>
                <i data-lucide="external-link" style="width: 12px; height: 12px; opacity: 0.5;"></i>
            </a>
        </footer>
    </div>

    <!-- External script -->
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
